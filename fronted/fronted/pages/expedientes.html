<div class="mb-4">
  <span id="count-badge" class="font-['DM_Mono'] text-xs px-3 py-1 bg-white border border-slate-200 rounded-full text-slate-500 font-medium shadow-sm">
    Cargando expedientes...
  </span>
</div>

<div class="flex flex-wrap gap-2 mb-6 items-center">
  <div class="relative flex-1 min-w-[180px]">
    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">⌕</span>
    <input type="text" id="search-input" placeholder="Buscar por nombre, materia, partes…" oninput="renderCards()"
           class="w-full pl-8 pr-3 py-2 text-[13px] font-['DM_Sans'] border border-slate-200 rounded-lg bg-white text-slate-800 outline-none focus:border-slate-400 transition-colors">
  </div>
  
  <select id="filter-materia" onchange="renderCards()" class="custom-select">
    <option value="">Todas las materias</option>
    <option value="Civil">Civil</option>
    <option value="Familiar">Familiar</option>
    <option value="Laboral">Laboral</option>
    <option value="Penal">Penal</option>
    <option value="Mercantil">Mercantil</option>
  </select>
  
  <select id="filter-plazo" onchange="renderCards()" class="custom-select">
    <option value="">Cualquier plazo</option>
    <option value="urgente">Urgente (≤7 días)</option>
    <option value="proximo">Próximo (8–30 días)</option>
    <option value="holgado">Holgado (>30 días)</option>
  </select>
  
  <select id="filter-estado" onchange="renderCards()" class="custom-select">
    <option value="">Todos los estados</option>
    <option value="Activo">Activo</option>
    <option value="En pausa">En pausa</option>
  </select>
  
  <button id="sort-btn" onclick="toggleSort()" class="font-['DM_Mono'] text-xs font-medium px-3 py-2 border border-slate-200 rounded-lg bg-white text-slate-500 hover:bg-slate-50 transition-colors whitespace-nowrap">
    Ordenar: Plazo ↑
  </button>
</div>

<div class="flex flex-col gap-3" id="cards-container"></div>
