<script>
    // Conectar el evento cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('pdf-input');
        if (input) {
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                console.log('Archivo seleccionado:', file); // Verifica en consola
                if (file) handleAutoUpload(file);
            });
        }
    });

    async function loadDashboardData() {
        try {
            const response = await fetch('http://127.0.0.1:8000/expedientes');
            const result = await response.json();
            console.log("Datos del GET:", result);

            if (response.ok) {
                const datosParaPintar = Array.isArray(result) ? result : result.data;
                renderCards(datosParaPintar);
            }
        } catch (error) {
            console.error("Error al obtener datos:", error);
        }
    }

    async function handleAutoUpload(file) {
        if (!file) return;

        const dropText = document.getElementById('drop-text');
        dropText.innerText = "PROCESANDO...";

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('http://127.0.0.1:8000/analyze', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();
            console.log("Respuesta del POST:", result);

            if (response.ok) {
                await loadDashboardData();
                dropText.innerText = "¡LISTO!";
            } else {
                dropText.innerText = "ERROR DEL SERVIDOR";
            }
        } catch (error) {
            console.error("Error en el POST:", error);
            dropText.innerText = "ERROR DE RED";
        }
    }

    function renderCards(datos) {
        const container = document.getElementById('ai-cards-container');
        if (!datos || datos.length === 0) {
            container.innerHTML = '<p class="text-slate-400 text-sm text-center py-4">Sin expedientes.</p>';
            return;
        }

        container.innerHTML = datos.map(item => `
             <div class="bg-[#F8F8F7] p-5 rounded-2xl mb-3 flex justify-between items-center border border-slate-100">
        <div>
            <p class="text-sm font-bold text-slate-700">${item.expediente || '—'} · ${item.titulo_caso || 'Sin nombre'}</p>
            <p class="text-xs text-slate-400 mt-1">${item.materia || ''} · ${item.resumen || ''}</p>
        </div>
        <span class="text-xs font-bold text-[#194A65] bg-white px-3 py-1 rounded-full border border-slate-100">
            ${item.estado || '—'}
        </span>
    </div>
        `).join('');
    }

    // Cargar datos al iniciar
    loadDashboardData();
</script>
