<div class="max-width-860">
    <div class="mb-6">
        <p class="text-slate-400 text-sm font-light">Completa los datos del caso o sube un PDF para que la IA extraiga la información.</p>
    </div>

    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center bg-white mb-6 hover:border-slate-400 transition-all cursor-pointer relative" id="upload-zone">
        <input type="file" id="pdf-input" accept=".pdf" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleFile(this.files[0])">
        <div class="w-12 h-12 bg-slate-50 rounded-xl flex items-center justify-center mx-auto mb-3">
            <i class="fas fa-cloud-upload-alt text-slate-400"></i>
        </div>
        <p class="text-sm font-semibold text-slate-700">Sube el primer documento del expediente</p>
        <p class="text-xs text-slate-400 mt-1">Arrastra un PDF aquí o haz clic para seleccionar</p>
    </div>

    <div id="ai-banner" class="hidden bg-indigo-50 border border-indigo-100 rounded-2xl p-5 mb-6 flex items-center gap-4 animate-in fade-in slide-in-from-top-4">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shrink-0">
            <i class="fas fa-magic"></i>
        </div>
        <div class="flex-1">
            <p class="text-sm font-bold text-indigo-900">Autocompletar con IA</p>
            <p class="text-xs text-indigo-700">Se han detectado datos en el PDF. ¿Quieres usarlos?</p>
        </div>
        <button onclick="runAI()" id="ai-big-btn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-indigo-700 flex items-center gap-2">
            <span>Extraer Datos</span>
            <div id="ai-big-spin" class="hidden w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>
    </div>

    <div class="space-y-4">
        <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
            <div class="px-5 py-3 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">1. Identificación</span>
                <button onclick="aiField('nombre')" class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">IA</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-px bg-slate-100">
                <div class="bg-white p-5">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Número de Expediente</label>
                    <input type="text" id="f-num" placeholder="EXP-2026-001" class="w-full outline-none text-sm text-slate-700">
                </div>
                <div class="bg-white p-5">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">Nombre del Caso</label>
                    <input type="text" id="f-nombre" placeholder="Ej. Pérez vs. Seguros" class="w-full outline-none text-sm text-slate-700">
                </div>
            </div>
        </div>

        <div class="bg-white border border-slate-100 rounded-2xl overflow-hidden shadow-sm">
            <div class="px-5 py-3 border-b border-slate-50 flex justify-between items-center">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">2. Resumen</span>
                <button onclick="aiField('resumen')" class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md">GENERAR CON IA</button>
            </div>
            <div class="p-5">
                <textarea id="f-resumen" rows="4" placeholder="Breve descripción de los hechos..." class="w-full outline-none text-sm text-slate-700 resize-none"></textarea>
            </div>
        </div>
    </div>

    <div class="mt-8 flex justify-end gap-3">
        <button onclick="loadPage('expedientes')" class="px-6 py-3 text-sm font-medium text-slate-500">Cancelar</button>
        <button onclick="saveNewExpediente()" class="px-8 py-3 bg-[#1A1917] text-white rounded-full text-xs font-bold uppercase tracking-widest hover:bg-black transition-all">
            Guardar Expediente
        </button>
    </div>
</div>
